name: Test

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...